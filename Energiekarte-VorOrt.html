<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1117">
<title>Energiekarte · Vor Ort</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0f1117;--surface:#181c27;--surface2:#1f2435;--border:#2a3050;--text:#e8eaf0;--muted:#7a8099;--accent:#4fc3f7;}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);}

#map{position:fixed;top:48px;left:0;right:0;bottom:64px;}

/* Top bar */
#top-bar{position:fixed;top:0;left:0;right:0;height:48px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;z-index:1000;}
.logo{font-size:13px;color:var(--accent);white-space:nowrap;font-weight:500;}
.proj-name{font-size:11px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.counts{font-size:10px;color:var(--text);white-space:nowrap;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:2px 9px;}

/* Legend toggle */
#legend-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:11px;padding:4px 8px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
#legend{position:fixed;top:54px;right:10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;z-index:1100;font-size:10px;display:none;min-width:160px;}
#legend.open{display:block;}
.leg-row{display:flex;align-items:center;gap:6px;padding:2px 0;}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* Bottom toolbar */
#bottom-bar{position:fixed;bottom:0;left:0;right:0;height:64px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;z-index:1000;padding:0 8px;}
.bar-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;border:none;background:transparent;color:var(--muted);font-size:10px;cursor:pointer;border-radius:10px;flex:1;}
.bar-btn .icon{font-size:20px;line-height:1;}
.bar-btn:active{background:var(--surface2);}
.bar-btn.active{color:var(--accent);}
.bar-btn.green{color:#4caf50;}

/* Detail panel */
#detail-panel{position:fixed;bottom:64px;left:0;right:0;max-height:72vh;background:var(--surface);border-top:2px solid var(--border);border-radius:18px 18px 0 0;z-index:2000;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
#detail-panel.open{transform:translateY(0);}
.dp-handle{width:38px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;flex-shrink:0;}
.dp-head{padding:10px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);flex-shrink:0;}
.dp-icon{font-size:18px;flex-shrink:0;}
.dp-title{flex:1;overflow:hidden;}
.dp-name{font-size:14px;font-weight:500;color:var(--text);display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dp-sub{font-size:10px;color:var(--muted);display:block;margin-top:1px;}
.dp-close{font-size:22px;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px;line-height:1;flex-shrink:0;}
.dp-body{padding:14px 16px 20px;overflow-y:auto;flex:1;}

/* Section label */
.sec-label{font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;}

/* Zustand */
.zustand-row{display:flex;gap:8px;margin-bottom:16px;}
.z-btn{flex:1;padding:11px 6px;border-radius:10px;border:2px solid var(--border);background:transparent;color:var(--muted);font-size:13px;cursor:pointer;text-align:center;}
.z-btn.active-gut     {border-color:#4caf50;background:#1b3a2a;color:#4caf50;}
.z-btn.active-mittel  {border-color:#f9a825;background:#2a2010;color:#f9a825;}
.z-btn.active-schlecht{border-color:#e53935;background:#2a1010;color:#e53935;}

/* Fotos */
.foto-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;min-height:80px;}
.foto-wrap{position:relative;}
.foto-thumb{width:76px;height:76px;object-fit:cover;border-radius:8px;border:1px solid var(--border);display:block;}
.foto-del{position:absolute;top:-5px;right:-5px;width:20px;height:20px;border-radius:50%;background:#e53935;color:#fff;border:none;font-size:12px;cursor:pointer;line-height:20px;text-align:center;padding:0;font-weight:bold;}
.add-foto{width:76px;height:76px;border:2px dashed var(--border);border-radius:8px;background:transparent;color:var(--muted);font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.add-foto:active{background:var(--surface2);}

/* Notes */
.notes-area{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:14px;padding:10px 12px;resize:none;height:90px;line-height:1.4;}
.notes-area:focus{outline:none;border-color:var(--accent);}

/* Empty state */
#empty-state{position:fixed;top:48px;left:0;right:0;bottom:64px;display:flex;align-items:center;justify-content:center;z-index:400;}
#empty-state.hidden{display:none;}
.empty-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px 36px;text-align:center;max-width:300px;}
.empty-card h2{font-size:17px;font-weight:500;margin-bottom:8px;}
.empty-card p{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.5;}
.empty-load-btn{padding:12px 0;border-radius:10px;border:2px solid var(--accent);background:transparent;color:var(--accent);font-family:inherit;font-size:14px;cursor:pointer;width:100%;}

/* GPS dot */
.gps-dot{width:14px;height:14px;border-radius:50%;background:#4fc3f7;border:3px solid #fff;box-shadow:0 0 10px rgba(79,195,247,.8);}
</style>
</head>
<body>

<div id="top-bar">
  <span class="logo">⚡ Vor Ort</span>
  <span class="proj-name" id="proj-name">Kein Projekt geladen</span>
  <span class="counts" id="top-counts" style="display:none;"></span>
  <button id="legend-btn" onclick="toggleLegend()">Legende</button>
</div>

<div id="legend">
  <div class="leg-row"><div class="leg-dot" style="background:#4fc3f7;"></div> Nicht erfasst</div>
  <div class="leg-row"><div class="leg-dot" style="background:#4caf50;"></div> Gut</div>
  <div class="leg-row"><div class="leg-dot" style="background:#f9a825;"></div> Mittel</div>
  <div class="leg-row"><div class="leg-dot" style="background:#e53935;"></div> Schlecht</div>
  <div style="border-top:1px solid var(--border);margin:6px 0;"></div>
  <div style="font-size:9px;color:var(--muted);">Gebäude = Polygon · Komponente = ◎</div>
</div>

<div id="map"></div>

<div id="empty-state">
  <div class="empty-card">
    <h2>Projekt laden</h2>
    <p>Exportiere das Projekt aus dem Bürotool (💾 Speichern) und lade die JSON-Datei hier.</p>
    <button class="empty-load-btn" onclick="document.getElementById('file-import').click()">📂 JSON laden</button>
  </div>
</div>

<div id="detail-panel">
  <div class="dp-handle"></div>
  <div class="dp-head">
    <span class="dp-icon" id="dp-icon">🏠</span>
    <div class="dp-title">
      <span class="dp-name" id="dp-name">—</span>
      <span class="dp-sub"  id="dp-sub"></span>
    </div>
    <button class="dp-close" onclick="closeDetail()">✕</button>
  </div>
  <div class="dp-body">
    <div class="sec-label">Zustand</div>
    <div class="zustand-row">
      <button class="z-btn" id="z-gut"      onclick="setZustand('gut')">🟢 Gut</button>
      <button class="z-btn" id="z-mittel"   onclick="setZustand('mittel')">🟡 Mittel</button>
      <button class="z-btn" id="z-schlecht" onclick="setZustand('schlecht')">🔴 Schlecht</button>
    </div>
    <div class="sec-label">Fotos <span id="foto-count" style="color:var(--accent);"></span></div>
    <div class="foto-row" id="foto-row"></div>
    <div class="sec-label" style="margin-top:4px;">Notizen</div>
    <textarea class="notes-area" id="dp-notizen" placeholder="Beobachtungen, Mängel, Maßnahmen…"
      oninput="saveNotizen()"></textarea>
    <div style="height:16px;"></div>
  </div>
</div>

<div id="bottom-bar">
  <button class="bar-btn" onclick="document.getElementById('file-import').click()">
    <span class="icon">📂</span>Laden
  </button>
  <button class="bar-btn" id="btn-gps" onclick="toggleGps()">
    <span class="icon">📍</span>GPS
  </button>
  <button class="bar-btn green" onclick="exportFeldbericht()">
    <span class="icon">💾</span>Export
  </button>
</div>

<input type="file" id="file-import" accept=".json"           style="display:none" onchange="importJSON(event)"/>
<input type="file" id="file-foto"   accept="image/*" capture="environment" style="display:none" onchange="onFotoSelected(event)"/>

<script>
// ── Konfiguration ─────────────────────────────────────────────────────────
const ASSET_CFG = {
  NAP:          { label:'NAP',               icon:'⚡', color:'#e53935' },
  Schaltanlage: { label:'Schaltanlage',      icon:'⊞', color:'#ff9800' },
  Trafo:        { label:'Trafo',             icon:'🔁', color:'#f9a825' },
  NSHV:         { label:'NSHV',             icon:'🗄',  color:'#4fc3f7' },
  UV:           { label:'UV',               icon:'📦', color:'#64b5f6' },
  Verbraucher:  { label:'Verbraucher',       icon:'🏠', color:'#81c784' },
  PV:           { label:'PV',              icon:'☀',  color:'#ffee58' },
  Batterie:     { label:'Batterie',          icon:'🔋', color:'#aed581' },
  Lade:         { label:'Ladeinfrastruktur', icon:'🔌', color:'#4dd0e1' },
  WP:           { label:'Wärmepumpe',       icon:'💨', color:'#ce93d8' },
  Nsa:          { label:'Notstromaggregat', icon:'⚙',  color:'#ff7043' },
  KWK:          { label:'KWK-Anlage',       icon:'🔥', color:'#f48fb1' },
  Wind:         { label:'Windkraftanlage',  icon:'🌀', color:'#80deea' },
  Reserve:      { label:'Reserve',          icon:'◻',  color:'#90a4ae' },
};

// ── State ─────────────────────────────────────────────────────────────────
let gebaeude        = [];
let elAssets        = [];
let feldDaten       = {};     // { [gebaeude.id]: {zustand,notizen,fotos,erfasstAm} }
let assetFeldDaten  = {};     // { [asset.id]:    {zustand,notizen,fotos,erfasstAm} }
let selectedId      = null;
let selectedType    = 'gebaeude'; // 'gebaeude' | 'asset'
let gpsMarker       = null;
let gpsWatch        = null;
let projektName     = '';
let buildingLayers  = {};
let assetLayers     = {};

// ── Map ───────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: false, tap: true }).setView([51.2, 10.4], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution:'© OpenStreetMap', maxZoom: 20
}).addTo(map);
L.control.zoom({ position: 'topright' }).addTo(map);

// ── Helpers ───────────────────────────────────────────────────────────────
function fdDict()      { return selectedType === 'asset' ? assetFeldDaten : feldDaten; }
function getFd(id)     { return (selectedType === 'asset' ? assetFeldDaten : feldDaten)[id] || null; }
function ensureFd(id)  {
  const d = selectedType === 'asset' ? assetFeldDaten : feldDaten;
  if (!d[id]) d[id] = { zustand: '', notizen: '', fotos: [], erfasstAm: null };
}
function zustandColor(z) {
  if (z === 'gut')      return '#4caf50';
  if (z === 'mittel')   return '#f9a825';
  if (z === 'schlecht') return '#e53935';
  return '#4fc3f7';
}
function polyCentroid(polygon) {
  const pts = polygon.map(p => Array.isArray(p) ? { lat:p[0], lng:p[1] } : p);
  return [pts.reduce((s,p)=>s+p.lat,0)/pts.length, pts.reduce((s,p)=>s+p.lng,0)/pts.length];
}

// ── Import ────────────────────────────────────────────────────────────────
function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const project = JSON.parse(e.target.result);
      gebaeude    = project.gebaeude || [];
      elAssets    = project.electrical?.assets || [];
      projektName = file.name.replace(/\.json$/i, '');
      feldDaten      = {};
      assetFeldDaten = {};
      gebaeude.forEach(g => { if (g.feldBericht) feldDaten[g.id] = Object.assign({fotos:[]}, g.feldBericht); });
      elAssets.forEach(a => { if (a.feldBericht) assetFeldDaten[a.id] = Object.assign({fotos:[]}, a.feldBericht); });
      document.getElementById('proj-name').textContent = projektName;
      document.getElementById('empty-state').classList.add('hidden');
      renderBuildings();
      renderAssets();
      updateCounts();
    } catch(err) { alert('Fehler beim Laden: ' + err.message); }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ── Gebäude rendern ───────────────────────────────────────────────────────
function renderBuildings() {
  Object.values(buildingLayers).forEach(l => {
    if (l.poly)   map.removeLayer(l.poly);
    if (l.marker) map.removeLayer(l.marker);
  });
  buildingLayers = {};
  const bounds = [];
  gebaeude.forEach(g => {
    if (!g.polygon?.length) return;
    const color = zustandColor(feldDaten[g.id]?.zustand);
    const poly = L.polygon(g.polygon, { color, weight:2, fillColor:color, fillOpacity:0.18 }).addTo(map);
    const center = polyCentroid(g.polygon);
    bounds.push(center);
    const marker = L.marker(center, { icon: buildingIcon(color) }).addTo(map);
    const open = () => selectBuilding(g.id);
    poly.on('click', open); marker.on('click', open);
    buildingLayers[g.id] = { poly, marker };
  });
  if (bounds.length) map.fitBounds(bounds, { padding:[40,40] });
}

function buildingIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:13px;height:13px;border-radius:50%;background:${color};border:2.5px solid rgba(255,255,255,.7);box-shadow:0 1px 4px rgba(0,0,0,.5);"></div>`,
    iconSize:[13,13], iconAnchor:[6,6]
  });
}

function refreshBuildingLayer(id) {
  const l = buildingLayers[id]; if (!l) return;
  const color = zustandColor(feldDaten[id]?.zustand);
  l.poly.setStyle({ color, fillColor: color });
  l.marker.setIcon(buildingIcon(color));
}

// ── Elektro-Assets rendern ────────────────────────────────────────────────
function renderAssets() {
  Object.values(assetLayers).forEach(l => { if (l.marker) map.removeLayer(l.marker); });
  assetLayers = {};
  elAssets.forEach(a => {
    if (a.lat == null || a.lng == null) return;
    const marker = L.marker([a.lat, a.lng], { icon: assetIcon(a), zIndexOffset: 500 }).addTo(map);
    marker.on('click', () => selectAsset(a.id));
    assetLayers[a.id] = { marker };
  });
}

function assetIcon(a) {
  const cfg   = ASSET_CFG[a.type] || { icon:'◻', color:'#90a4ae' };
  const color = zustandColor(assetFeldDaten[a.id]?.zustand) || cfg.color;
  return L.divIcon({
    className: '',
    html: `<div style="width:26px;height:26px;border-radius:50%;background:${color};border:2.5px solid rgba(255,255,255,.8);box-shadow:0 1px 5px rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;font-size:12px;">${cfg.icon}</div>`,
    iconSize:[26,26], iconAnchor:[13,13]
  });
}

function refreshAssetLayer(id) {
  const l = assetLayers[id]; if (!l) return;
  const a = elAssets.find(x => x.id === id); if (!a) return;
  l.marker.setIcon(assetIcon(a));
}

// ── Detail-Panel öffnen ───────────────────────────────────────────────────
function selectBuilding(id) {
  selectedId = id; selectedType = 'gebaeude';
  const g = gebaeude.find(x => x.id === id); if (!g) return;
  const fd = feldDaten[id] || {};
  document.getElementById('dp-icon').textContent = '🏠';
  document.getElementById('dp-name').textContent = g.name || ('Gebäude ' + id);
  const info = [g.nutzung, g.flaeche ? Math.round(g.flaeche)+' m²' : null,
    g.stockwerke ? g.stockwerke+' OG' : null].filter(Boolean).join(' · ');
  document.getElementById('dp-sub').textContent = info;
  openDetailPanel(fd);
}

function selectAsset(id) {
  selectedId = id; selectedType = 'asset';
  const a = elAssets.find(x => x.id === id); if (!a) return;
  const fd  = assetFeldDaten[id] || {};
  const cfg = ASSET_CFG[a.type] || { icon:'◻', label: a.type };
  document.getElementById('dp-icon').textContent = cfg.icon;
  document.getElementById('dp-name').textContent = a.name || (cfg.label + ' ' + id);
  const propStr = Object.entries(a.props||{})
    .map(([k,v]) => `${k}: ${v}`).join(' · ');
  document.getElementById('dp-sub').textContent = cfg.label + (propStr ? ' · ' + propStr : '');
  openDetailPanel(fd);
}

function openDetailPanel(fd) {
  ['gut','mittel','schlecht'].forEach(z => {
    document.getElementById('z-' + z).className = 'z-btn' + (fd.zustand === z ? ' active-'+z : '');
  });
  document.getElementById('dp-notizen').value = fd.notizen || '';
  renderFotoRow();
  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  selectedId = null;
}

// ── Zustand & Notizen ─────────────────────────────────────────────────────
function setZustand(z) {
  if (!selectedId) return;
  ensureFd(selectedId);
  const d = fdDict();
  d[selectedId].zustand   = z;
  d[selectedId].erfasstAm = new Date().toISOString();
  ['gut','mittel','schlecht'].forEach(v => {
    document.getElementById('z-'+v).className = 'z-btn' + (v===z ? ' active-'+v : '');
  });
  if (selectedType === 'asset') refreshAssetLayer(selectedId);
  else refreshBuildingLayer(selectedId);
  updateCounts();
}

function saveNotizen() {
  if (!selectedId) return;
  ensureFd(selectedId);
  const d = fdDict();
  d[selectedId].notizen   = document.getElementById('dp-notizen').value;
  d[selectedId].erfasstAm = new Date().toISOString();
}

// ── Fotos ─────────────────────────────────────────────────────────────────
function onFotoSelected(event) {
  const file = event.target.files[0];
  if (!file || !selectedId) return;
  compressImage(file, base64 => {
    ensureFd(selectedId);
    const d = fdDict();
    d[selectedId].fotos = d[selectedId].fotos || [];
    d[selectedId].fotos.push(base64);
    d[selectedId].erfasstAm = new Date().toISOString();
    renderFotoRow();
    updateCounts();
  });
  event.target.value = '';
}

function removeFoto(idx) {
  if (!selectedId) return;
  const d = fdDict();
  if (!d[selectedId]?.fotos) return;
  d[selectedId].fotos.splice(idx, 1);
  renderFotoRow();
  updateCounts();
}

function renderFotoRow() {
  const row   = document.getElementById('foto-row');
  const fotos = (fdDict()[selectedId]?.fotos) || [];
  row.innerHTML = '';
  fotos.forEach((src, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'foto-wrap';
    wrap.innerHTML = `<img class="foto-thumb" src="${src}" onclick="zoomFoto(this.src)"/>` +
      `<button class="foto-del" onclick="removeFoto(${i})">✕</button>`;
    row.appendChild(wrap);
  });
  const btn = document.createElement('button');
  btn.className = 'add-foto'; btn.textContent = '+';
  btn.onclick = () => document.getElementById('file-foto').click();
  row.appendChild(btn);
  document.getElementById('foto-count').textContent = fotos.length ? `(${fotos.length})` : '';
}

function zoomFoto(src) {
  const ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;display:flex;align-items:center;justify-content:center;';
  ov.innerHTML = `<img src="${src}" style="max-width:95vw;max-height:90vh;border-radius:8px;"/>`;
  ov.onclick = () => document.body.removeChild(ov);
  document.body.appendChild(ov);
}

function compressImage(file, callback) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const MAX = 1400; let w = img.width, h = img.height;
      if (w > MAX) { h = Math.round(h*MAX/w); w = MAX; }
      if (h > MAX) { w = Math.round(w*MAX/h); h = MAX; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      callback(canvas.toDataURL('image/jpeg', 0.72));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ── GPS ───────────────────────────────────────────────────────────────────
function toggleGps() {
  if (gpsWatch !== null) {
    navigator.geolocation.clearWatch(gpsWatch); gpsWatch = null;
    if (gpsMarker) { map.removeLayer(gpsMarker); gpsMarker = null; }
    document.getElementById('btn-gps').classList.remove('active');
    return;
  }
  if (!navigator.geolocation) { alert('GPS nicht verfügbar.'); return; }
  document.getElementById('btn-gps').classList.add('active');
  gpsWatch = navigator.geolocation.watchPosition(pos => {
    const { latitude:lat, longitude:lng } = pos.coords;
    const icon = L.divIcon({ className:'', html:'<div class="gps-dot"></div>', iconSize:[14,14], iconAnchor:[7,7] });
    if (gpsMarker) gpsMarker.setLatLng([lat, lng]);
    else { gpsMarker = L.marker([lat,lng],{icon,zIndexOffset:5000}).addTo(map); map.flyTo([lat,lng],17); }
  }, err => {
    alert('GPS-Fehler: '+err.message);
    document.getElementById('btn-gps').classList.remove('active'); gpsWatch = null;
  }, { enableHighAccuracy:true, maximumAge:5000 });
}

// ── Legende ───────────────────────────────────────────────────────────────
function toggleLegend() {
  document.getElementById('legend').classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('#legend') && !e.target.closest('#legend-btn'))
    document.getElementById('legend').classList.remove('open');
});

// ── Export ────────────────────────────────────────────────────────────────
function exportFeldbericht() {
  const toEintraege = (dict) => Object.entries(dict)
    .filter(([,fd]) => fd.zustand || fd.notizen || fd.fotos?.length)
    .map(([id, fd]) => ({ id: isNaN(id) ? id : parseInt(id),
      zustand: fd.zustand, notizen: fd.notizen, fotos: fd.fotos||[], erfasstAm: fd.erfasstAm }));

  const eintraegeGebaeude = toEintraege(feldDaten);
  const eintraegeAssets   = toEintraege(assetFeldDaten);

  if (!eintraegeGebaeude.length && !eintraegeAssets.length) {
    alert('Noch keine Felddaten erfasst.'); return;
  }
  const report = {
    version: 1, typ: 'feldbericht',
    exportedAt: new Date().toISOString(), projektName,
    eintraegeGebaeude, eintraegeAssets
  };
  const blob = new Blob([JSON.stringify(report, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (projektName||'projekt') + '_feldbericht_' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(a.href);
}

// ── Counts ────────────────────────────────────────────────────────────────
function updateCounts() {
  const totalGeb   = gebaeude.filter(g => g.polygon?.length).length;
  const totalAsset = elAssets.length;
  const erfGeb     = Object.values(feldDaten).filter(fd => fd.zustand||fd.notizen||fd.fotos?.length).length;
  const erfAsset   = Object.values(assetFeldDaten).filter(fd => fd.zustand||fd.notizen||fd.fotos?.length).length;
  const el = document.getElementById('top-counts');
  if (totalGeb + totalAsset > 0) {
    el.style.display = '';
    el.textContent = `Geb ${erfGeb}/${totalGeb} · Komp ${erfAsset}/${totalAsset}`;
  }
}
</script>
